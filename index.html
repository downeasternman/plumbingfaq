<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Service FAQ – R. H. Foster Energy</title>
<style>
  /* ─── TOKENS ─────────────────────────────────────────────────────────── */
  :root {
    --red:       #C8202E;
    --red-dark:  #9e1822;
    --red-light: #fdf1f2;
    --ink:       #1a1a1a;
    --ink-2:     #444;
    --ink-3:     #767676;
    --rule:      #e0e0e0;
    --bg:        #f7f7f5;
    --white:     #ffffff;
    --pill-bg:   #efefed;
    --pill-active-bg: #C8202E;
    --pill-active-text: #fff;
    --radius:    6px;
    --shadow:    0 1px 4px rgba(0,0,0,.08), 0 3px 12px rgba(0,0,0,.05);
    --shadow-open: 0 2px 16px rgba(0,0,0,.10);
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --transition: 0.22s ease;
  }

  /* ─── RESET ─────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--red); }

  /* ─── HEADER ─────────────────────────────────────────────────────────── */
  .site-header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .logo-wrap img {
    height: 44px;
    display: block;
  }
  .logo-fallback {
    display: none;
    font-size: 18px;
    font-weight: 800;
    color: var(--red);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-titles {
    border-left: 2px solid var(--rule);
    padding-left: 18px;
  }
  .header-titles h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.2px;
    line-height: 1.2;
  }
  .header-titles p {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 1px;
  }

  /* ─── MAIN LAYOUT ────────────────────────────────────────────────────── */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ─── SEARCH ─────────────────────────────────────────────────────────── */
  .search-wrap {
    position: relative;
    margin-bottom: 18px;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
    width: 18px;
    height: 18px;
  }
  #search {
    width: 100%;
    padding: 13px 44px 13px 44px;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 15px;
    background: var(--white);
    color: var(--ink);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    box-shadow: var(--shadow);
  }
  #search:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(200,32,46,.12);
  }
  #search::placeholder { color: var(--ink-3); }
  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-3);
    padding: 4px;
    display: none;
    line-height: 1;
    border-radius: 50%;
    transition: color var(--transition), background var(--transition);
  }
  .search-clear:hover { color: var(--red); background: var(--red-light); }

  /* ─── CATEGORY PILLS ─────────────────────────────────────────────────── */
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .pill {
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 12.5px;
    font-weight: 600;
    background: var(--pill-bg);
    color: var(--ink-2);
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: 0.1px;
    user-select: none;
  }
  .pill:hover {
    background: var(--white);
    border-color: var(--red);
    color: var(--red);
  }
  .pill.active {
    background: var(--pill-active-bg);
    color: var(--pill-active-text);
    border-color: var(--pill-active-bg);
  }

  /* ─── RESULTS COUNT ──────────────────────────────────────────────────── */
  .results-meta {
    font-size: 12px;
    color: var(--ink-3);
    margin-bottom: 12px;
    min-height: 18px;
    letter-spacing: 0.1px;
  }

  /* ─── FAQ ITEMS ──────────────────────────────────────────────────────── */
  .faq-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .faq-item {
    background: var(--white);
    border-radius: var(--radius);
    border: 1.5px solid var(--rule);
    box-shadow: var(--shadow);
    transition: border-color var(--transition), box-shadow var(--transition);
    overflow: hidden;
  }
  .faq-item.open {
    border-color: var(--red);
    box-shadow: var(--shadow-open);
  }
  .faq-item.hidden { display: none; }

  .faq-trigger {
    width: 100%;
    background: none;
    border: none;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-align: left;
    transition: background var(--transition);
  }
  .faq-trigger:hover { background: var(--red-light); }
  .faq-item.open .faq-trigger { background: var(--red-light); }

  .faq-cat-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(200,32,46,.08);
    border-radius: 4px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .faq-title-group { flex: 1; min-width: 0; }
  .faq-title {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .faq-desc {
    font-size: 12.5px;
    color: var(--ink-3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .faq-item.open .faq-desc { white-space: normal; overflow: visible; }
  .faq-chevron {
    flex-shrink: 0;
    color: var(--ink-3);
    transition: transform var(--transition), color var(--transition);
  }
  .faq-item.open .faq-chevron {
    transform: rotate(180deg);
    color: var(--red);
  }

  /* ─── EXPANDED CONTENT ───────────────────────────────────────────────── */
  .faq-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .faq-body-inner {
    padding: 0 18px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    border-top: 1px solid var(--rule);
    padding-top: 18px;
  }
  @media (max-width: 580px) {
    .faq-body-inner { grid-template-columns: 1fr; }
  }

  .faq-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .faq-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* Questions to ask */
  .faq-questions ol {
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .faq-questions li {
    display: flex;
    gap: 10px;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.45;
  }
  .q-num {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--red);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  /* What to tell the customer */
  .faq-script {
    background: var(--bg);
    border-left: 3px solid var(--red);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.6;
    font-style: italic;
  }
  .faq-script strong {
    font-style: normal;
    font-weight: 700;
    color: var(--ink);
    display: block;
    margin-bottom: 6px;
    font-size: 12px;
    letter-spacing: 0.2px;
  }

  /* Urgency flag */
  .urgency-flag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10.5px;
    font-weight: 700;
    color: #b34500;
    background: #fff4ec;
    border: 1px solid #f7c299;
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 10px;
    letter-spacing: 0.2px;
  }
  .urgency-flag.emergency {
    color: #b00020;
    background: #fff0f1;
    border-color: #f5b0b7;
  }

  /* ─── EMPTY STATE ────────────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }
  .empty-state svg { color: var(--rule); margin-bottom: 16px; }
  .empty-state h3 { font-size: 15px; color: var(--ink-2); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; color: var(--ink-3); }

  /* ─── FOOTER ─────────────────────────────────────────────────────────── */
  .site-footer {
    background: var(--white);
    border-top: 1px solid var(--rule);
    padding: 16px 20px;
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .site-footer span { color: var(--red); font-weight: 600; }

  /* ─── HIGHLIGHT ──────────────────────────────────────────────────────── */
  mark {
    background: rgba(200,32,46,.15);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ─── STOP CONDITION BANNER ─────────────────────────────────────────── */
  .stop-banner {
    grid-column: 1 / -1;
    background: #fff0f1;
    border: 2px solid #b00020;
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 4px;
  }
  .stop-banner-title {
    font-size: 13px;
    font-weight: 800;
    color: #b00020;
    letter-spacing: 0.3px;
    line-height: 1.35;
  }
  .stop-banner-until {
    font-size: 12.5px;
    color: var(--ink);
    margin-top: 5px;
    line-height: 1.45;
  }

  /* ─── PRINT ───────────────────────────────────────────────────────────── */
  @media print {
    .search-wrap,
    .pills,
    .results-meta,
    .search-clear,
    .faq-chevron { display: none !important; }
    .site-header {
      position: static;
      box-shadow: none;
    }
    body {
      background: #fff;
      font-size: 12px;
    }
    .main { padding: 12px 0 24px; }
    .faq-item {
      break-inside: avoid;
      border: 1px solid #ccc;
      margin-bottom: 8px;
      box-shadow: none;
    }
    .faq-item.hidden { display: block !important; }
    .faq-body {
      max-height: none !important;
      overflow: visible !important;
    }
    .faq-trigger { pointer-events: none; }
    .faq-item.open .faq-trigger,
    .faq-trigger:hover { background: transparent; }
    mark { background: none; padding: 0; }
    .site-footer { border-top: 1px solid #ccc; }
  }
</style>

<script>
const FAQ = [

  // ── WATER HEATERS ──────────────────────────────────────────────────────
  {
    id: "wh-no-hot-water",
    category: "Water Heater",
    title: "No hot water",
    desc: "Water heater not producing any hot water, or runs cold quickly.",
    urgency: null,
    urgencyLabel: null,
    questions: [
      "Is the unit electric, gas, propane, or oil-fired?",
      "How old is the water heater, roughly?",
      "Is it a tank unit or tankless?",

      "Are any carbon monoxide detectors going off right now?",
      "Is this a sudden loss or has it been getting worse over time?",
      "How many people in the household? (helps size replacement if needed)",
    ],
    script: "I've got your request in. The plumbing team will call you back to schedule a visit. If any carbon monoxide detectors are going off, leave the house right away, call 911, and do not re-enter until emergency responders clear it. In the meantime, check that your circuit breaker hasn't tripped (for electric) or that your pilot light is lit (for gas or propane units). If you're comfortable doing so, you can also check that the temperature dial on the unit hasn't been accidentally turned down.",
    email: "", phone: ""
  },
  {
    id: "wh-leaking",
    category: "Water Heater",
    title: "Water heater leaking",
    desc: "Water pooling at base, dripping from connections, or pressure relief valve discharge.",
    urgency: "urgent",
    urgencyLabel: "Urgent — water damage risk",
    questions: [
      "Where exactly is the leak coming from — bottom of tank, top connections, or the pressure relief valve on the side?",
      "How much water? A drip, a steady stream, or flooding?",
      "Is the water heater electric, gas, propane, or oil-fired?",
      "How old is the unit?",
      "Is there a floor drain nearby, or is water accumulating?",
      "Can the customer safely turn off the cold water supply to the unit? (Usually a valve above or near the tank.)",
    ],
    script: "While you wait for our tech, if the leak is significant, please turn off the cold water supply valve to the water heater — it's usually a handle or knob on the pipe going into the top of the tank. If you're not comfortable doing that, that's completely fine, just leave it. Do not turn off your main water unless the leak is uncontrolled. Keep the area around the heater clear. Our team will call you shortly.",
    email: "", phone: ""
  },
  {
    id: "wh-too-hot",
    category: "Water Heater",
    title: "Hot water is too hot / scalding",
    desc: "Water coming from the tap is dangerously hot or steaming.",
    urgency: "urgent",
    urgencyLabel: "Urgent — scalding risk",
    stopCondition: "Instruct customer to stop using hot water",
    stopUntil: "Stay on the line until the customer confirms no one (especially children or elderly) is using the hot water.",
    questions: [
      "How hot is the water — is it steaming or sputtering out of the tap?",
      "Is this happening at all faucets, or just one specific shower or sink?",
      "Has anyone adjusted the temperature dial on the water heater or mixing valve recently?",
      "Is the water heater electric, gas, propane, or oil-fired?",
      "If it's a tank unit, is it making any loud boiling and rumbling noises?",

    script: "Dangerously hot water is a serious scalding risk, so please ensure no one uses the hot water—especially children—until this is resolved. If you feel comfortable doing so, you can look at the thermostat dial on the water heater to see if it was accidentally bumped up; it should generally be set to 120 degrees or 'Warm'. If it's already set correctly, or if you aren't comfortable checking, do not touch it. The issue could be a failed internal thermostat or a bad mixing valve. We will treat this as a priority and get a technician dispatched.",
    email: "", phone: ""
  },

  // ── PIPES & LEAKS ──────────────────────────────────────────────────────
  {
    id: "pipes-burst-freeze",
    category: "Pipes & Leaks",
    title: "Burst or frozen pipe",
    desc: "Pipe has burst, or water won't flow and freezing is suspected.",
    urgency: "emergency",
    urgencyLabel: "Emergency — shut off water immediately",
    stopCondition: "Do not proceed until water is off",
    stopUntil: "Stay on the line until the customer confirms the main water shutoff is closed or the active leak is fully stopped.",
    questions: [
      "Is there active water flowing or flooding right now?",
      "Do they know where the main water shutoff is?",
      "Has the pipe actually burst (water coming out) or just frozen (no flow)?",
      "What part of the house — exterior wall, crawl space, basement, attic?",
      "Is this a supply line, a drain, or do they not know?",
      "How cold has it been in that area of the house?",
      "Is the heat currently on in the home?",
    ],
    script: "First priority: if there's water actively coming out of a burst pipe, please go to your main water shutoff and turn it off now. It's usually in the basement, near the water meter, or where the main line enters the house. Once you've done that, the immediate damage stops. If the pipe is frozen but hasn't burst, do not use an open flame to thaw it. A hair dryer on low is safe. Leave cabinet doors open under sinks on exterior walls to let warm air in. We'll get someone out to you as fast as we can.",
    email: "", phone: ""
  },
  {
    id: "pipes-under-sink",
    category: "Pipes & Leaks",
    title: "Under-sink or supply line leak",
    desc: "Dripping or spraying from pipes under a sink, toilet, or appliance connection.",
    urgency: null,
    urgencyLabel: null,
    questions: [
      "Kitchen or bathroom? Which fixture?",
      "Is it dripping or a steady flow?",
      "Is the leak at a joint, a braided supply line, or the shutoff valve itself?",

      "Any water damage to the cabinet floor or wall already?",
      "How long has it been leaking?",
    ],
    script: "If there's a shutoff valve under the sink or behind the toilet, go ahead and turn that off — it's the small oval or lever handle on the supply line. That stops water to just that fixture without affecting the rest of the house. Put a towel or a bucket under the leak in the meantime. We'll get a tech scheduled to come take a look.",
    email: "", phone: ""
  },
  {
    id: "pipes-wall-ceiling",
    category: "Pipes & Leaks",
    title: "Pipe leak in wall or ceiling",
    desc: "Water stain, dripping, or wet drywall with no visible source.",
    urgency: "urgent",
    urgencyLabel: "Urgent — mold and structural risk",
    questions: [
      "Where exactly — which room, which wall or ceiling area?",
      "Is water actively dripping or just a stain?",
      "Is there a bathroom, kitchen, or laundry above the affected area?",
      "Has the main water been shut off?",
      "Is there any chance this is a roof leak vs. a pipe? (Is it worse after rain?)",
      "Any recent renovation or work done in that area?",
    ],
    script: "If you're seeing active dripping or the stain is spreading, it's worth turning off the main water supply to the house to limit any further damage while we get someone out to you. The main shutoff is usually in your basement, utility room, or where the line comes in from outside. Take a photo of the stain if you can — it helps the tech assess when they arrive.",
    email: "", phone: ""
  },
  {
    id: "pipes-noisy",
    category: "Pipes & Leaks",
    title: "Banging or noisy pipes (water hammer)",
    desc: "Loud thud or banging when water is turned on or off.",
    urgency: null,
    urgencyLabel: null,
    questions: [
      "When does it happen — when you turn water on, off, or both?",
      "Which fixtures trigger it? Just one or throughout the house?",
      "How long has it been happening?",
      "Is this a newer issue or has it always done this?",
      "Has your water pressure been checked recently?",
      "Any recent plumbing work done in the house?",
    ],
    script: "This is a common issue called water hammer — it's the pipes reacting to sudden pressure changes when water flow stops. It won't cause an immediate emergency, but it can stress joints over time. Jot down when and where it happens most so the tech has that detail when they arrive.",
    email: "", phone: ""
  },

  // ── DRAINS ─────────────────────────────────────────────────────────────
  {
    id: "drain-kitchen",
    category: "Drains",

    desc: "Soggy ground over drain field, sewage surfacing in yard, or system not absorbing.",
    urgency: "urgent",
    urgencyLabel: "Urgent — health and environmental hazard",
    questions: [
      "Is there wet or soft ground over the drain field area?",
      "Any sewage smell or visible effluent on the surface?",
      "Are drains in the house still working or backing up?",
      "When was the tank last pumped?",
      "Has there been heavy or prolonged rain recently?",
      "How old is the septic system?",
      "Has anyone driven heavy equipment over the drain field?",
    ],
    script: "Please keep people and pets off the drain field area — surfacing effluent is a health hazard. Reduce water use as much as possible: no laundry, limit showers and toilet flushes. A failed drain field is a serious situation that may require a new field design or system replacement — our septic team will need to assess. We're flagging this as a priority.",
    email: "", phone: ""
  },

]; // ← end of FAQ array

// ═══════════════════════════════════════════════════════════════════════════
//  APP LOGIC — no need to edit below this line
// ═══════════════════════════════════════════════════════════════════════════

(function () {
  const searchEl   = document.getElementById('search');
  const clearBtn   = document.getElementById('searchClear');
  const pillsEl    = document.getElementById('pills');
  const listEl     = document.getElementById('faqList');
  const metaEl     = document.getElementById('resultsMeta');
  const emptyEl    = document.getElementById('emptyState');

  let activeCategory = 'All';
  let searchQuery    = '';

  const SEARCH_ALIASES = {
    'fawcet': 'faucet',
    'fawcett': 'faucet',
    'cartridge': 'faucet cartridge valve',
    'showerhead': 'shower head',
    'hot water tank': 'water heater',
    'hwt': 'water heater',
    'scalding': 'hot water scalding too hot',
    'lp': 'propane',
    'lp gas': 'propane',
    'furnace': 'furnace forced air heating',
    'forced air': 'furnace forced air',
    'sewer': 'drain sewer',
    'clogged': 'clog drain',
    'backing up': 'sewer backup drain',
    'co': 'carbon monoxide',
    'lockout': 'lockout reset burner boiler',
    'run out': 'runout empty tank oil propane',
    'mini split': 'heat pump mini split',
    'minisplit': 'heat pump mini split',
    'mitsubishi': 'heat pump mitsubishi',
    'fujitsu': 'heat pump fujitsu',
    'defrost': 'heat pump defrost',
    'thermostat': 'thermostat control nest ecobee',
    'nest': 'thermostat nest smart',
    'ecobee': 'thermostat ecobee smart',
    'ac': 'central air conditioning',
    'air conditioner': 'central air conditioning ac',
    'condenser': 'central air conditioning outdoor unit',
    'ductwork': 'airflow duct vent',
    'duct': 'airflow duct vent',
    'musty': 'odor smell duct vent',
    'fuel oil': 'oil leak odor heating',
    'oil smell': 'oil leak odor heating',
    'tune up': 'maintenance annual service',
    'tuneup': 'maintenance annual service',
    'maintenance': 'routine maintenance annual tune up',
    'generac': 'generator standby maintenance',
  };

  function normalizeSearchText(text) {
    return String(text).toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function expandAliases(query) {
    let normalized = normalizeSearchText(query);
    if (!normalized) return normalized;
    // Replace aliases only on whole-word boundaries so short aliases
    // (e.g. "co", "lp") never match inside longer words like "cold" or "help".
    Object.entries(SEARCH_ALIASES).forEach(([alias, replacement]) => {
      const aliasNorm = normalizeSearchText(alias);
      if (!aliasNorm) return;
      const escaped = aliasNorm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp(`\\b${escaped}\\b`, 'g');
      normalized = normalized.replace(pattern, normalizeSearchText(replacement));
    });
    return normalized.replace(/\s+/g, ' ').trim();
  }

  function buildSearchIndex(item) {
    return normalizeSearchText([
      item.title,
      item.desc,
      item.category,
      item.urgencyLabel || '',
      item.stopCondition || '',
      item.questions.join(' '),
      item.script,
    ].join(' '));
  }

  function searchMatches(indexText, query) {
    if (!query) return true;
    const q = expandAliases(query);
    if (!q) return true;
    if (indexText.includes(q)) return true;
    return q.split(' ').filter(Boolean).every(token => indexText.includes(token));
  }

  function recalcOpenAccordion() {
    document.querySelectorAll('.faq-item.open:not(.hidden)').forEach(el => {
      const body = el.querySelector('.faq-body');
      body.style.maxHeight = body.scrollHeight + 'px';
    });
  }

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(recalcOpenAccordion, 100);
  });

  // ── Build category list ──────────────────────────────────────────────
  const allCats = ['All', ...new Set(FAQ.map(f => f.category))];

  allCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCategory = cat;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
    pillsEl.appendChild(btn);
  });

  // ── Build accordion items ────────────────────────────────────────────
  FAQ.forEach(item => {
    const el = document.createElement('div');
    el.className = 'faq-item';
    el.dataset.id = item.id;
    el.dataset.category = item.category;
    el.dataset.search = buildSearchIndex(item);

    let urgencyHtml = '';
    if (item.urgency) {
      urgencyHtml = `<div class="urgency-flag ${item.urgency === 'emergency' ? 'emergency' : ''}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        ${item.urgencyLabel}
      </div>`;
    }

    let stopHtml = '';
    if (item.stopCondition) {
      stopHtml = `<div class="stop-banner" role="alert">
        <div class="stop-banner-title">STOP — ${item.stopCondition}</div>
        ${item.stopUntil ? `<div class="stop-banner-until">${item.stopUntil}</div>` : ''}
      </div>`;
    }

    const questionsHtml = item.questions.map((q, i) =>
      `<li><span class="q-num">${i + 1}</span><span>${q}</span></li>`
    ).join('');

    el.innerHTML = `
      <button class="faq-trigger" aria-expanded="false">
        <span class="faq-cat-badge">${item.category}</span>
        <span class="faq-title-group">
          <span class="faq-title">${item.title}</span>
          <span class="faq-desc">${item.desc}</span>
        </span>
        <svg class="faq-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="faq-body">
        <div class="faq-body-inner">
          ${stopHtml}
          <div class="faq-questions">
            ${urgencyHtml}
            <div class="faq-section-label">Questions to Ask</div>
            <ol>${questionsHtml}</ol>
          </div>
          <div class="faq-tell">
            <div class="faq-section-label">What to Tell the Customer</div>
            <div class="faq-script">
              <strong>While you wait for a callback:</strong>
              ${item.script}
            </div>
          </div>
        </div>
      </div>
    `;

    // Accordion toggle
    const trigger = el.querySelector('.faq-trigger');
    const body    = el.querySelector('.faq-body');
    trigger.addEventListener('click', () => {
      const isOpen = el.classList.contains('open');
      // Close all others
      document.querySelectorAll('.faq-item.open').forEach(o => {
        o.classList.remove('open');
        o.querySelector('.faq-trigger').setAttribute('aria-expanded', 'false');
        o.querySelector('.faq-body').style.maxHeight = null;
      });
      if (!isOpen) {
        el.classList.add('open');
        trigger.setAttribute('aria-expanded', 'true');
        body.style.maxHeight = body.scrollHeight + 'px';
      }
    });

    listEl.appendChild(el);
  });

  // ── Filter logic ─────────────────────────────────────────────────────
  function applyFilters() {
    const q = searchQuery.trim();
    let visible = 0;

    // Remove old highlights
    document.querySelectorAll('.faq-item').forEach(el => {
      const item = FAQ.find(f => f.id === el.dataset.id);
      if (!item) return;

      const catMatch = activeCategory === 'All' || el.dataset.category === activeCategory;
      const searchMatch = searchMatches(el.dataset.search, q);
      const show = catMatch && searchMatch;

      el.classList.toggle('hidden', !show);
      if (show) visible++;

      // Highlight matching text in title and desc
      const titleEl = el.querySelector('.faq-title');
      const descEl  = el.querySelector('.faq-desc');
      if (q && searchMatch) {
        titleEl.innerHTML = highlight(item.title, q);
        descEl.innerHTML  = highlight(item.desc, q);
      } else {
        titleEl.textContent = item.title;
        descEl.textContent  = item.desc;
      }
    });

    // Recompute open item height after filter
    recalcOpenAccordion();

    metaEl.textContent = q || activeCategory !== 'All'
      ? `${visible} result${visible !== 1 ? 's' : ''}${activeCategory !== 'All' ? ` in ${activeCategory}` : ''}${q ? ` for "${q}"` : ''}`
      : `${FAQ.length} topics`;

    emptyEl.style.display = visible === 0 ? 'block' : 'none';
  }

  function highlight(text, q) {
    if (!q) return text;
    const tokens = expandAliases(q).split(' ').filter(t => t.length > 1);
    if (!tokens.length) return text;
    const regex = new RegExp(`(${tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  // ── Search input ─────────────────────────────────────────────────────
  searchEl.addEventListener('input', () => {
    searchQuery = searchEl.value;
    clearBtn.style.display = searchQuery ? 'flex' : 'none';
    applyFilters();
  });

  clearBtn.addEventListener('click', () => {
    searchEl.value = '';
    searchQuery = '';
    clearBtn.style.display = 'none';
    searchEl.focus();
    applyFilters();
  });

  // ── Init ─────────────────────────────────────────────────────────────
  applyFilters();

})();
</script>
</body>
</html>
